services:

  # DATABASES

  catalog-postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pwd
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  order-postgres:
    image: postgres:16-alpine
    container_name: order-postgres-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pwd
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  payment-postgres:
    image: postgres:16-alpine
    container_name: payment-postgres-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pwd
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # KAFKA

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  init-kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: init-kafka
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --list

      echo 'Creating Kafka topics'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev.orders.events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev.payments.events --replication-factor 1 --partitions 3

      echo 'Successfully created Kafka topics:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    restart: unless-stopped
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      - kafka
      - schema-registry

  # OBSERVABILITY

  loki:
    image: grafana/loki:3.5.1
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yml"

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: alloy
    restart: unless-stopped
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
      TEMPO_OTLP_GRPC_URL: ${TEMPO_OTLP_GRPC_URL:-tempo:4317}
    volumes:
      - ./loki/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - ../../services/api-gateway/logs:/var/log/apps/api-gateway:ro
      - ../../services/catalog-service/logs:/var/log/apps/catalog-service:ro
      - ../../services/order-service/logs:/var/log/apps/order-service:ro
      - ../../services/payment-service/logs:/var/log/apps/payment-service:ro
      - alloy_data:/var/lib/alloy/data
    command:
      - run
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - /etc/alloy/config.alloy
    depends_on:
      - loki
      - tempo

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    command:
      - "-config.file=/etc/tempo/tempo-config.yml"

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      APP_ENV: ${APP_ENV:-local}
      API_GATEWAY_METRICS_TARGET: ${API_GATEWAY_METRICS_TARGET:-host.docker.internal:8080}
      CATALOG_SERVICE_METRICS_TARGET: ${CATALOG_SERVICE_METRICS_TARGET:-host.docker.internal:8081}
      ORDER_SERVICE_METRICS_TARGET: ${ORDER_SERVICE_METRICS_TARGET:-host.docker.internal:8082}
      PAYMENT_SERVICE_METRICS_TARGET: ${PAYMENT_SERVICE_METRICS_TARGET:-host.docker.internal:8083}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s|__APP_ENV__|$${APP_ENV}|g" \
          -e "s|__API_GATEWAY_METRICS_TARGET__|$${API_GATEWAY_METRICS_TARGET}|g" \
          -e "s|__CATALOG_SERVICE_METRICS_TARGET__|$${CATALOG_SERVICE_METRICS_TARGET}|g" \
          -e "s|__ORDER_SERVICE_METRICS_TARGET__|$${ORDER_SERVICE_METRICS_TARGET}|g" \
          -e "s|__PAYMENT_SERVICE_METRICS_TARGET__|$${PAYMENT_SERVICE_METRICS_TARGET}|g" \
          /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.console.libraries=/usr/share/prometheus/console_libraries \
          --web.console.templates=/usr/share/prometheus/consoles
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.4.4
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      TEMPO_URL: ${TEMPO_URL:-http://tempo:3200}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  catalog_postgres_data:
  order_postgres_data:
  payment_postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alloy_data:
  tempo_data:
  kafka_data:
