spring:
  application:
    name: catalog-service
  data:
    mongodb:
      uri: mongodb://admin:pwd@localhost:27017/catalog_db?authSource=admin
      uuid-representation: standard

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
