spring:
  application:
    name: catalog-service
  datasource:
    url: ${CATALOG_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catalog_db}
    username: ${CATALOG_DATASOURCE_USERNAME:admin}
    password: ${CATALOG_DATASOURCE_PASSWORD:pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db.changelog-master.xml
  grpc:
    server:
      port: 9091

server:
  port: ${SERVER_PORT:8081}

app:
  environment: ${APP_ENV:local}

logging:
  file:
    path: ${LOG_PATH:services/${spring.application.name}/logs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${app.environment}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
