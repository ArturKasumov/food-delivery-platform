spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: catalog-service
              uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/catalog/**
              filters:
                - PreserveHostHeader
                - DedupeResponseHeader=X-Correlation-Id RETAIN_LAST

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      probes:
        enabled: true
    gateway:
      access: read_only
