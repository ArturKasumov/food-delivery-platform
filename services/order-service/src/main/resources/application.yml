server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: order-service
  datasource:
    url: ${ORDER_DATASOURCE_URL:jdbc:postgresql://localhost:5433/order_db}
    username: ${ORDER_DATASOURCE_USERNAME:admin}
    password: ${ORDER_DATASOURCE_PASSWORD:pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  grpc:
    client:
      channels:
        catalog-service:
          address: ${CATALOG_GRPC_ADDRESS:static://localhost:9091}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: record
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:order-service}
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
        value.subject.name.strategy: io.confluent.kafka.serializers.subject.TopicRecordNameStrategy
        acks: all
        enable.idempotence: true
        retries: 2147483647
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        retry.backoff.ms: 1000
        max.in.flight.requests.per.connection: 1
        max.block.ms: 10000

app:
  kafka:
    topics:
      order-events: ${KAFKA_TOPIC_ORDER_EVENTS:dev.orders.events}
      payment-events: ${KAFKA_TOPIC_PAYMENT_EVENTS:dev.payments.events}
  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
      batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:50}
      fixed-delay: ${OUTBOX_PUBLISHER_FIXED_DELAY:5s}
      max-retry-attempts: ${OUTBOX_PUBLISHER_MAX_RETRY_ATTEMPTS:3}
      processing-timeout: ${OUTBOX_PUBLISHER_PROCESSING_TIMEOUT:3m}

  environment: ${APP_ENV:local}

logging:
  file:
    path: ${LOG_PATH:services/${spring.application.name}/logs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${app.environment}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
