server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: payment-service

  datasource:
    url: ${PAYMENT_DATASOURCE_URL:jdbc:postgresql://localhost:5434/payment_db}
    username: ${PAYMENT_DATASOURCE_USERNAME:admin}
    password: ${PAYMENT_DATASOURCE_PASSWORD:pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: record
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:payment-service}
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
        value.subject.name.strategy: io.confluent.kafka.serializers.subject.TopicRecordNameStrategy
        acks: all
        enable.idempotence: true
        retries: 2147483647
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        retry.backoff.ms: 1000
        max.in.flight.requests.per.connection: 1
        max.block.ms: 10000

app:
  psp:
    base-url: ${PSP_BASE_URL:http://localhost:8084/api/v1/psp-simulator}
    callback-url: ${PSP_CALLBACK_URL:http://localhost:8083/api/v1/payment/callback/psp-simulator}
    callback-secret: ${PSP_CALLBACK_SECRET:local-psp-callback-secret}
    connect-timeout: 2s
    read-timeout: 5s
    callback-timestamp-tolerance: 5m
  checkout:
    worker:
      enabled: ${CHECKOUT_WORKER_ENABLED:true}
      batch-size: ${CHECKOUT_WORKER_BATCH_SIZE:10}
      fixed-delay: ${CHECKOUT_WORKER_FIXED_DELAY:2s}
      processing-timeout: ${CHECKOUT_WORKER_PROCESSING_TIMEOUT:1m}
  kafka:
    topics:
      order-events: ${KAFKA_TOPIC_ORDER_EVENTS:dev.orders.events}
      payment-events: ${KAFKA_TOPIC_PAYMENT_EVENTS:dev.payments.events}
  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
      batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:50}
      fixed-delay: ${OUTBOX_PUBLISHER_FIXED_DELAY:5s}
      max-retry-attempts: ${OUTBOX_PUBLISHER_MAX_RETRY_ATTEMPTS:3}
      processing-timeout: ${OUTBOX_PUBLISHER_PROCESSING_TIMEOUT:3m}

  environment: ${APP_ENV:local}

logging:
  file:
    path: ${LOG_PATH:services/${spring.application.name}/logs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${app.environment}
